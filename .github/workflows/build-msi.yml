name: Build Windows MSI

# Genera el instalador .msi de "Asistente IA - La Vianda" en un runner
# real de Windows (windows-latest), sin que necesites tener Windows en
# tu propia computadora. El .msi resultante queda disponible para
# descargar como "artifact" del workflow.
#
# Cómo usarlo:
#   1. Sube este repositorio a GitHub.
#   2. Ve a la pestaña "Actions" del repo.
#   3. Ejecuta manualmente "Build Windows MSI" (o crea un tag "v1.0.0"
#      y haz push: git tag v1.0.0 && git push origin v1.0.0).
#   4. Cuando termine (unos minutos), entra al resultado del workflow y
#      descarga el artifact "AsistenteIA-Setup" — ahí está el .msi.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Determinar versión (desde el tag de git) y build (run_number)
        # Única fuente de verdad de la versión: se toma del propio tag
        # que disparó este build (ej. "v1.3.2" -> "1.3.2") y del contador
        # de builds de Actions, y se sobrescribe core/version.py con
        # esos valores — nunca se edita ese archivo a mano.
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ($tagName -match '^v?(\d+\.\d+\.\d+)$') {
            $version = $matches[1]
          } else {
            # Se ejecutó manualmente (sin tag "vX.Y.Z"): build de desarrollo.
            $version = "0.0.0"
          }
          $build = "${{ github.run_number }}"
          $buildDate = Get-Date -Format "yyyy-MM-dd"

          $lines = @(
            '"""',
            'Única fuente de verdad de la versión de la aplicación.',
            '',
            'GENERADO AUTOMÁTICAMENTE por .github/workflows/build-msi.yml en',
            'cada build — NO editar a mano, se sobrescribe en el próximo tag.',
            '"""',
            "APP_VERSION = ""$version""",
            "APP_BUILD = $build",
            "BUILD_DATE = ""$buildDate"""
          )
          Set-Content -Path "core\version.py" -Value $lines -Encoding utf8

          Write-Host "Version embebida: $version (build $build, fecha $buildDate)"

          # Versión del propio .msi (4 partes numéricas, como exige Windows Installer).
          # IMPORTANTE: esto se sustituye DIRECTO en una copia del .wxs (ver más abajo,
          # antes de candle.exe), no se pasa como parámetro -d de candle.exe: esa vía
          # tiene un bug real de parseo de argumentos con valores tipo "X.Y.Z.W"
          # (CNDL0103, candle.exe interpreta mal el punto final del valor).
          $msiBuildPart = [int]$build % 65535
          $productVersion = "$version.$msiBuildPart"
          Write-Host "Version del .msi: $productVersion"

          New-Item -ItemType Directory -Force -Path "packaging\wix\obj" | Out-Null
          $productWxsContent = Get-Content "packaging\wix\Product.wxs" -Raw
          $replacement = 'Version="' + $productVersion + '"'
          $productWxsContent = $productWxsContent -replace 'Version="0\.0\.0\.0"', $replacement
          Set-Content -Path "packaging\wix\obj\Product.generated.wxs" -Value $productWxsContent -Encoding utf8BOM -NoNewline

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generar ejecutable con PyInstaller
        run: pyinstaller --noconfirm --clean packaging/pyinstaller/app.spec

      - name: Escribir .env con las credenciales (desde GitHub Secrets)
        # Genera el .env DENTRO de dist/AsistenteIA (junto al .exe), para
        # que heat.exe lo incluya como un archivo más al armar el .msi.
        # Los valores nunca aparecen en los logs de Actions: se mapean a
        # variables de entorno del paso (no se interpolan directamente
        # en el script), que es la práctica recomendada por GitHub.
        env:
          ASISTENTEIA_MS_CLIENT_ID: ${{ secrets.ASISTENTEIA_MS_CLIENT_ID }}
          ASISTENTEIA_MS_TENANT_ID: ${{ secrets.ASISTENTEIA_MS_TENANT_ID }}
          ASISTENTEIA_AI_ENDPOINT: ${{ secrets.ASISTENTEIA_AI_ENDPOINT }}
          ASISTENTEIA_AI_API_KEY: ${{ secrets.ASISTENTEIA_AI_API_KEY }}
        run: |
          $lines = @(
            "ASISTENTEIA_MS_CLIENT_ID=$env:ASISTENTEIA_MS_CLIENT_ID",
            "ASISTENTEIA_MS_TENANT_ID=$env:ASISTENTEIA_MS_TENANT_ID",
            "ASISTENTEIA_AI_ENDPOINT=$env:ASISTENTEIA_AI_ENDPOINT",
            "ASISTENTEIA_AI_API_KEY=$env:ASISTENTEIA_AI_API_KEY"
          )
          Set-Content -Path "dist\AsistenteIA\.env" -Value $lines -Encoding utf8
        shell: pwsh

      - name: Instalar WiX Toolset
        run: choco install wixtoolset -y

      - name: Agregar WiX Toolset al PATH
        run: |
          $wixBin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" -Directory | Select-Object -First 1
          echo "$($wixBin.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Generar Files.wxs con heat.exe
        run: heat.exe dir dist\AsistenteIA -o packaging\wix\Files.wxs -ag -srd -cg AppFiles -dr INSTALLFOLDER -var var.SourceDir

      - name: Compilar con candle.exe
        run: candle.exe -dSourceDir=dist\AsistenteIA -out packaging\wix\obj\ packaging\wix\obj\Product.generated.wxs packaging\wix\Files.wxs

      - name: Enlazar con light.exe (genera el .msi)
        run: light.exe -out dist\AsistenteIA-Setup.msi packaging\wix\obj\Product.generated.wixobj packaging\wix\obj\Files.wixobj

      - name: Publicar el instalador como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: AsistenteIA-Setup
          path: dist\AsistenteIA-Setup.msi
